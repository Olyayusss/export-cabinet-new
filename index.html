<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1440" />
<title>Кабінет експорт-клієнта</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #ffffff;
    --bg-soft: #fafafa;
    --bg-sidebar: #f8f8f7;
    --bg-hover: #f1f1ef;
    --bg-active: #ebebe9;
    --border: #ebebea;
    --border-strong: #d9d9d6;
    --text: #1a1a1a;
    --text-soft: #555555;
    --text-muted: #8a8a8a;
    --text-faint: #b4b4b0;
    --accent: #2266EE;
    --accent-soft: #eaf0ff;
    --accent-hover: #1a55cc;
    --green: #167a3f;
    --green-soft: #e6f4ec;
    --amber: #a36b00;
    --amber-soft: #fcf2dc;
    --red: #b3261e;
    --red-soft: #fbe9e7;
    --grey: #555;
    --grey-soft: #efefee;
    --radius: 6px;
    --radius-lg: 10px;
    --shadow-sm: 0 1px 0 rgba(0,0,0,0.04);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.05);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Inter',ui-sans-serif,system-ui,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer}
  a{color:inherit;text-decoration:none}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#d6d6d3;border-radius:8px;border:2px solid var(--bg)}
  ::-webkit-scrollbar-track{background:transparent}
  #app{min-height:100vh}
</style>
</head>
<body>
<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="src/icons.jsx"></script>
<script type="text/babel" src="src/data.jsx"></script>
<script type="text/babel" src="src/primitives.jsx"></script>
<script type="text/babel" src="src/sidebar.jsx"></script>
<script type="text/babel" src="src/reclamation-modal.jsx"></script>
<script type="text/babel" src="src/invite-person-modal.jsx"></script>
<script type="text/babel" src="src/views/projects.jsx"></script>
<script type="text/babel" src="src/views/project-detail.jsx"></script>
<script type="text/babel" src="src/views/product-detail.jsx"></script>
<script type="text/babel" src="src/views/invoices.jsx"></script>
<script type="text/babel" src="src/views/deliveries.jsx"></script>
<script type="text/babel" src="src/views/reclamations.jsx"></script>
<script type="text/babel" src="src/views/profile.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>

</body>
</html>
